name: Eval – Kiro Progressive Steering

on:
  pull_request:
    paths:
      - 'kanon/src/adapters/kiro*.ts'
      - 'kanon/templates/harness-adapters/kiro/**'
      - 'kanon/src/schemas.ts'
      - 'kanon/src/validate.ts'
      - 'kanon/src/wizard.ts'
      - 'kanon/src/eval/rubrics/kiro-progressive-steering.ts'
      - 'kanon/fixtures/eval/kiro-progressive-steering/**'

permissions:
  contents: read

# Cancel in-progress runs for the same PR — only the latest push matters.
concurrency:
  group: eval-kiro-progressive-steering-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  eval-kiro-progressive-steering:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kanon
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.bun/install/cache
            kanon/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('kanon/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Build scenario-mixed fixture
        run: bun run dev build --harness kiro
        working-directory: kanon/fixtures/eval/kiro-progressive-steering/scenario-mixed

      - name: Run progressive-steering rubric
        run: |
          bun run dev eval \
            --harness kiro \
            --rubric progressive-steering \
            --build fixtures/eval/kiro-progressive-steering/scenario-mixed/expected-build \
            --json \
            --output rubric.json

      - name: Upload rubric result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rubric-kiro-progressive-steering
          path: kanon/rubric.json
          retention-days: 90
