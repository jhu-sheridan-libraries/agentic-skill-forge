name: CodeQL

on:
  schedule:
    # Weekly scan — catches newly-published CVEs against existing code
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kanon

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          source-root: kanon
          # Focus on the CLI source and MCP bridge; exclude generated dist and node_modules
          paths-ignore: |
            kanon/dist
            kanon/node_modules
            kanon/build
          queries: +security-extended
          # Focus on source; exclude generated and dependency directories
          config: |
            paths-ignore:
              - "kanon/dist/**"
              - "kanon/node_modules/**"
              - "kanon/build/**"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
        working-directory: kanon

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
