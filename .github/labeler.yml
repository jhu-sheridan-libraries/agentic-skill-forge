# Labels applied automatically based on changed file paths.
# Used by label-pr.yml workflow.

artifact:
  - changed-files:
      - any-glob-to-any-file: kanon/knowledge/**

collection:
  - changed-files:
      - any-glob-to-any-file: kanon/collections/**

tool:
  - changed-files:
      - any-glob-to-any-file:
          - kanon/src/**
          - kanon/templates/**
          - kanon/scripts/**

bridge:
  - changed-files:
      - any-glob-to-any-file:
          - kanon/src/mcp-bridge.ts
          - kanon/bridge/**

schemas:
  - changed-files:
      - any-glob-to-any-file: kanon/src/schemas.ts

adapters:
  - changed-files:
      - any-glob-to-any-file: kanon/src/adapters/**

ci:
  - changed-files:
      - any-glob-to-any-file: .github/**

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - kanon/docs/**

adr:
  - changed-files:
      - any-glob-to-any-file: kanon/docs/adr/**

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - kanon/package.json
          - kanon/bun.lock
