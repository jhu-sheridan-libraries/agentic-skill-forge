- name: awspricing
  transport: stdio
  command: uvx
  args:
  - awslabs.aws-pricing-mcp-server@latest
  env:
    FASTMCP_LOG_LEVEL: ERROR
  timeout: 120000
- name: awsknowledge
  transport: http
  url: https://knowledge-mcp.global.api.aws
- name: awsapi
  transport: stdio
  command: uvx
  args:
  - awslabs.aws-api-mcp-server@latest
  env:
    AWS_REGION: us-east-2
- name: context7
  transport: stdio
  command: npx
  args:
  - -y
  - '@upstash/context7-mcp'
  timeout: 120000
- name: fetch
  transport: stdio
  command: uvx
  args:
  - mcp-server-fetch
