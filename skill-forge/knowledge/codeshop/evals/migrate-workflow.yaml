# Eval: migrate workflow — multi-turn phase progression
#
# Simulates an agent progressing through the 5-phase migrate workflow.
# Verifies checksum discipline is applied at every phase transition,
# rollback criteria are defined, and dry-run precedes execution.
#
# Run:  bun run dev eval codeshop

description: "migrate workflow — multi-turn phase progression and checksum discipline"

prompts:
  - - role: system
      content: file://dist/kiro/codeshop/POWER.md
    - role: user
      content: "{{query}}"

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-6
    config:
      region: us-east-1
      temperature: 0

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-6

tests:
  - description: "T1: Migration request triggers migrate skill and loads inventory phase"
    vars:
      query: >
        We need to migrate the users table to a new schema that splits
        name into first_name and last_name. Based on the codeshop skills,
        which workflow should I use and what's the first phase?
    assert:
      - type: icontains
        value: "migrate"
      - type: icontains-any
        value:
          - "inventory"
          - "baseline"
          - "checksum"
          - "row count"
          - "catalog"
      - type: llm-rubric
        value: >
          The agent should identify this as a data migration (migrate
          workflow) and begin the Inventory phase: cataloging the users
          table, establishing baseline checksums, and identifying
          exclusions. PASS if it names migrate and starts with inventory.
          FAIL if it jumps to writing migration SQL.

  - description: "T2: After inventory, agent defines migration plan with rollback criteria"
    vars:
      query: >
        Using the migrate workflow for the users table name split.
        Inventory phase complete: 50,000 rows, columns id/name/email/created_at,
        baseline checksums established (COUNT=50000, SUM(id)=1250025000).
        Foreign key: orders.user_id references users.id. No exclusions.
        What's the next phase in the migrate workflow?
    assert:
      - type: icontains-any
        value:
          - "plan"
          - "rollback"
          - "checkpoint"
          - "step"
      - type: llm-rubric
        value: >
          The agent should enter the Plan phase: defining migration steps
          in dependency order, with per-step rollback criteria and
          verification checkpoints. PASS if the plan includes rollback
          criteria. FAIL if it produces steps without rollback.

  - description: "T3: After planning, agent insists on dry-run before production"
    vars:
      query: >
        Using the migrate workflow. Plan phase complete: 4 steps
        (1. ADD first_name/last_name columns, 2. POPULATE from name,
        3. VERIFY checksums match, 4. DROP name column). Each step has
        rollback SQL defined. I want to run it now against production.
        What does the migrate workflow say about this?
    assert:
      - type: icontains-any
        value:
          - "dry-run"
          - "dry run"
          - "staging"
          - "copy"
          - "rehearsal"
          - "test environment"
      - type: llm-rubric
        value: >
          The agent MUST insist on a dry-run before production execution.
          Skipping dry-run is an explicit anti-pattern in the migrate
          workflow. PASS if the agent refuses to go directly to production
          and proposes running against a copy/staging first. FAIL if it
          proceeds directly to production.

  - description: "T4: After successful dry-run, agent proceeds to execute with checkpoints"
    vars:
      query: >
        Using the migrate workflow. Dry-run phase complete against staging
        copy: all 4 steps executed, checksums match at every boundary
        (COUNT=50000, SUM(id)=1250025000 preserved), execution time 45s,
        no discrepancies. Ready for production. What's the next phase
        in the migrate workflow?
    assert:
      - type: icontains-any
        value:
          - "backup"
          - "checkpoint"
          - "step by step"
          - "execute"
          - "production"
      - type: llm-rubric
        value: >
          The agent should enter the Execute phase: verifying backup exists,
          executing step by step with checkpoints at each boundary.
          PASS if it mentions backup verification and per-step checkpoints.
          FAIL if it runs as a single unmonitored operation.

  - description: "T5: After execution, agent performs full reconciliation"
    vars:
      query: >
        Using the migrate workflow. Execute phase complete: all 4 steps
        passed checkpoints against production (backup verified before start,
        each step halted and verified before proceeding). What's the final
        phase in the migrate workflow and what should I verify?
    assert:
      - type: icontains-any
        value:
          - "checksum"
          - "reconciliation"
          - "integrity"
          - "smoke test"
          - "verify"
      - type: llm-rubric
        value: >
          The agent should enter the Verify phase: full checksum
          reconciliation, referential integrity validation, application
          smoke tests, and performance comparison. PASS if it describes
          multi-dimensional verification beyond row counts. FAIL if it
          only checks row counts or declares success without verification.
