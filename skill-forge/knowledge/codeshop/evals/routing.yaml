# Eval: Skill Router dispatches user intents to correct steering files
#
# Each test combines:
# - icontains-any: fast check that the correct skill appears
# - not-icontains: fast check that the most likely wrong skill is absent
# - llm-rubric: semantic check that the routing rationale is sound
#
# Run:  bun run dev eval codeshop

description: "Skill Router dispatches user intents to correct steering files"

prompts:
  - - role: system
      content: file://dist/kiro/codeshop/POWER.md
    - role: user
      content: "{{user_query}}"

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-6
    config:
      region: us-east-1
      temperature: 0

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-6

tests:
  - description: "TDD trigger routes to drive-tests, not review-changes"
    vars:
      user_query: "Let's do TDD on the payment module"
    assert:
      - type: icontains-any
        value: ["drive-tests", "TDD", "red-green", "test-driven"]
      - type: not-icontains
        value: "review-changes"
      - type: llm-rubric
        value: >
          Should select drive-tests/TDD. PASS if drive-tests is chosen.
          FAIL if it routes to a different skill.

  - description: "Bug report routes to triage-bug, not journal-debug"
    vars:
      user_query: "Users can't submit forms after the last deploy"
    assert:
      - type: icontains-any
        value: ["triage-bug", "triage", "investigate", "root cause"]
      - type: not-icontains
        value: "journal-debug"
      - type: llm-rubric
        value: >
          Reported problem with unknown root cause → triage-bug.
          PASS if triage-bug. FAIL if journal-debug.

  - description: "Ambiguous 'review' routes to review-changes, not refactor-architecture"
    vars:
      user_query: "Review my PR"
    assert:
      - type: icontains-any
        value: ["review-changes", "code review"]
      - type: not-icontains
        value: "refactor-architecture"
      - type: not-icontains
        value: "plan-refactor"
      - type: llm-rubric
        value: >
          PR review → review-changes. PASS if review-changes.
          FAIL if refactor-architecture or plan-refactor.

  - description: "Grill me routes to stress-test-plan, not challenge-domain-model"
    vars:
      user_query: "Grill me on this design"
    assert:
      - type: icontains-any
        value: ["stress-test-plan", "grill", "stress test"]
      - type: not-icontains
        value: "challenge-domain-model"
      - type: llm-rubric
        value: >
          Grilling a design → stress-test-plan. PASS if stress-test-plan.
          FAIL if challenge-domain-model.

  - description: "Domain model trigger routes to challenge-domain-model, not stress-test-plan"
    vars:
      user_query: "Challenge my domain model"
    assert:
      - type: icontains-any
        value: ["challenge-domain-model", "domain model", "domain grilling"]
      - type: not-icontains
        value: "stress-test-plan"
      - type: llm-rubric
        value: >
          Domain model challenge → challenge-domain-model. PASS if
          challenge-domain-model. FAIL if stress-test-plan.

  - description: "PRD trigger routes to draft-prd, not compose-issues"
    vars:
      user_query: "Write a PRD for the notification system"
    assert:
      - type: icontains-any
        value: ["draft-prd", "PRD", "product requirements"]
      - type: not-icontains
        value: "compose-issues"
      - type: llm-rubric
        value: >
          Writing a PRD → draft-prd. PASS if draft-prd.
          FAIL if compose-issues.

  - description: "Issue creation routes to compose-issues, not draft-prd"
    vars:
      user_query: "Break this plan into GitHub issues"
    assert:
      - type: icontains-any
        value: ["compose-issues", "issues", "vertical slices"]
      - type: not-icontains
        value: "draft-prd"
      - type: llm-rubric
        value: >
          Breaking into issues → compose-issues. PASS if compose-issues.
          FAIL if draft-prd.

  - description: "Debugging session routes to journal-debug, not triage-bug"
    vars:
      user_query: "I need to isolate why the cache is returning stale data"
    assert:
      - type: icontains-any
        value: ["journal-debug", "debug journal", "isolate", "articulate"]
      - type: not-icontains
        value: "triage-bug"
      - type: llm-rubric
        value: >
          Active debugging (isolating) → journal-debug. PASS if
          journal-debug. FAIL if triage-bug.

  - description: "Commit message trigger routes to craft-commits"
    vars:
      user_query: "Help me write a good commit message for this change"
    assert:
      - type: icontains-any
        value: ["craft-commits", "commit", "conventional"]
      - type: llm-rubric
        value: >
          Should route to craft-commits. PASS if craft-commits.

  - description: "Architecture review routes to refactor-architecture, not review-changes"
    vars:
      user_query: "This module feels too coupled, can you review the architecture?"
    assert:
      - type: icontains-any
        value: ["refactor-architecture", "architecture review", "shallow module", "deep module"]
      - type: not-icontains
        value: "review-changes"
      - type: not-icontains
        value: "plan-refactor"
      - type: llm-rubric
        value: >
          Architecture coupling → refactor-architecture. PASS if
          refactor-architecture. FAIL if review-changes or plan-refactor.

  - description: "Laconic mode trigger routes to laconic-output"
    vars:
      user_query: "Be brief from now on"
    assert:
      - type: icontains-any
        value: ["laconic", "spartan", "terse", "brief"]
      - type: llm-rubric
        value: >
          Should route to laconic-output. PASS if laconic-output.

  - description: "Living docs trigger routes to write-living-docs"
    vars:
      user_query: "Audit the docs in this repo and harvest what's missing"
    assert:
      - type: icontains-any
        value: ["write-living-docs", "living doc", "harvest", "documentation audit"]
      - type: llm-rubric
        value: >
          Should route to write-living-docs. PASS if write-living-docs.

  - description: "Integration routes to integrate, not design-interface"
    vars:
      user_query: "Wire up the Stripe webhook endpoint"
    assert:
      - type: icontains-any
        value: ["integrate", "wire", "adapter", "contract-first"]
      - type: not-icontains
        value: "design-interface"
      - type: llm-rubric
        value: >
          External service wiring → integrate. PASS if integrate.
          FAIL if design-interface.

  - description: "Migration routes to migrate, not plan-refactor"
    vars:
      user_query: "Migrate the user table to the new schema"
    assert:
      - type: icontains-any
        value: ["migrate", "migration", "checksum", "inventory"]
      - type: not-icontains
        value: "plan-refactor"
      - type: llm-rubric
        value: >
          Data migration → migrate. PASS if migrate.
          FAIL if plan-refactor.
