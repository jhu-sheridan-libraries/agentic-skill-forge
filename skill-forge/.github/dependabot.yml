version: 2

updates:
  # npm / bun dependencies
  - package-ecosystem: npm
    directory: /skill-forge
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Batch non-security minor/patch updates to reduce noise
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Bun updates are managed manually — API surface changes frequently
      - dependency-name: bun-types

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
