# Gitleaks configuration for context-bazaar
# Scans for accidentally committed secrets, especially in knowledge artifacts
# and mcp-servers.yaml env blocks.

title = "context-bazaar gitleaks config"

[extend]
# Start from the default ruleset and add project-specific rules
useDefault = true

[[rules]]
id = "mcp-env-hardcoded-secret"
description = "Hardcoded secret in MCP server env block"
regex = '''(?i)(api[_-]?key|secret|token|password|credential)\s*[:=]\s*["']?[A-Za-z0-9+/]{20,}["']?'''
path = '''mcp-servers\.yaml'''
tags = ["mcp", "secret"]

[[rules]]
id = "aws-bearer-token-bedrock"
description = "AWS Bedrock bearer token"
regex = '''AWS_BEARER_TOKEN_BEDROCK\s*[=:]\s*["']?[A-Za-z0-9+/]{20,}["']?'''
tags = ["aws", "bedrock", "secret"]

[allowlist]
description = "Allow placeholder values and test fixtures"
regexes = [
  # Common placeholder patterns used in templates and docs
  '''your[-_]?(api[-_]?key|secret|token|password)''',
  '''<YOUR[-_]?[A-Z_]+>''',
  '''example[-_]?(key|token|secret)''',
  # Bun lockfile hashes are not secrets
  '''bun\.lockb''',
]
paths = [
  # Node modules are scanned by their own audits
  '''node_modules''',
  # Compiled output is derived from source
  '''dist/''',
  # Test fixtures intentionally contain fake keys
  '''src/__tests__/''',
]
