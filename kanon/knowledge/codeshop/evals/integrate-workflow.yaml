# Eval: integrate workflow — multi-turn phase progression
#
# Simulates an agent progressing through the 5-phase integrate workflow.
# The POWER.md is the system prompt; each test provides a conversation
# history as the user query to simulate phase transitions.
#
# Run:  bun run dev eval codeshop

description: "integrate workflow — multi-turn phase progression and methodology"

prompts:
  - - role: system
      content: file://dist/kiro/codeshop/POWER.md
    - role: user
      content: "{{query}}"

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-6
    config:
      region: us-east-1
      temperature: 0

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-6

tests:
  - description: "T1: User request triggers integrate skill and loads discover phase"
    vars:
      query: "I need to wire up the Stripe webhook endpoint to our payment service."
    assert:
      - type: icontains
        value: "integrate"
      - type: llm-rubric
        value: >
          The agent should identify this as an integration task and begin
          the Discover phase: identifying the target system (Stripe),
          protocol (REST/webhooks), data flows, callers, and failure modes.
          PASS if the response begins discovery by asking about or mapping
          the integration boundary. FAIL if it skips to implementation
          or loads a different skill.

  - description: "T2: After discovery, agent transitions to contract phase"
    vars:
      query: >
        I need to wire up the Stripe webhook endpoint. I've already mapped
        the boundary: target is Stripe webhooks (REST/HTTPS), data flows
        are POST requests with event payloads, our PaymentService consumes
        parsed events, failure modes include signature verification failures
        and duplicate delivery. No existing adapter. What's the next phase?
    assert:
      - type: icontains-any
        value:
          - "contract"
          - "interface"
          - "types"
      - type: llm-rubric
        value: >
          The agent should transition to the Contract phase: defining
          request/response shapes, error codes, authentication (webhook
          signature verification), and the adapter's public interface
          BEFORE writing implementation. PASS if it defines the contract
          first. FAIL if it starts writing code or skips to wiring.

  - description: "T3: After contract, agent transitions to wire phase with anti-corruption layer"
    vars:
      query: >
        I'm integrating Stripe webhooks. Discovery and contract are done.
        I have StripeEvent type, WebhookError union, and signature
        verification defined. Now I need to implement the adapter.
    assert:
      - type: icontains-any
        value:
          - "adapter"
          - "anti-corruption"
          - "test"
          - "vertical slice"
      - type: llm-rubric
        value: >
          The agent should enter the Wire phase: implementing an
          anti-corruption layer adapter with integration tests using
          test doubles. It should build one vertical slice (happy path)
          first. PASS if it creates an adapter with tests against
          test doubles. FAIL if it writes code without tests or
          calls the Stripe API directly without an adapter layer.

  - description: "T4: After wiring, agent transitions to harden phase"
    vars:
      query: >
        Stripe webhook adapter is wired with passing integration tests
        against test doubles for the happy path. What's the next phase
        in the integrate workflow?
    assert:
      - type: icontains-any
        value:
          - "harden"
          - "retry"
          - "timeout"
          - "circuit"
          - "error handling"
      - type: llm-rubric
        value: >
          The agent should enter the Harden phase: adding retries with
          backoff, circuit breaker, timeouts, and graceful degradation.
          Each concern should get its own test. PASS if it addresses
          error handling at the system boundary. FAIL if it considers
          the work done after the happy path.

  - description: "T5: After hardening, agent transitions to verify phase"
    vars:
      query: >
        Stripe webhook adapter is hardened with retry, timeout, circuit
        breaker, and degradation tests all passing. What's the final
        phase in the integrate workflow?
    assert:
      - type: icontains-any
        value:
          - "verify"
          - "smoke test"
          - "staging"
          - "real service"
          - "end-to-end"
      - type: llm-rubric
        value: >
          The agent should enter the Verify phase: running an end-to-end
          smoke test against the real Stripe service or staging environment.
          PASS if it proposes verification against a real/staging endpoint.
          FAIL if it considers the work done without real-service verification.
