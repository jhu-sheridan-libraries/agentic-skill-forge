# Eval: migrate workflow — multi-turn phase progression
#
# Simulates an agent progressing through the 5-phase migrate workflow.
# Verifies checksum discipline is applied at every phase transition,
# rollback criteria are defined, and dry-run precedes execution.
#
# Run:  bun run dev eval codeshop

description: "migrate workflow — multi-turn phase progression and checksum discipline"

prompts:
  - - role: system
      content: file://dist/kiro/codeshop/POWER.md
    - role: user
      content: "{{query}}"

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-6
    config:
      region: us-east-1
      temperature: 0

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-6

tests:
  - description: "T1: Migration request triggers migrate skill and loads inventory phase"
    vars:
      query: "We need to migrate the users table to a new schema that splits name into first_name and last_name."
    assert:
      - type: icontains
        value: "migrate"
      - type: icontains-any
        value:
          - "inventory"
          - "baseline"
          - "checksum"
          - "row count"
          - "catalog"
      - type: llm-rubric
        value: >
          The agent should identify this as a data migration and begin
          the Inventory phase: cataloging the users table, establishing
          baseline checksums, and identifying exclusions. PASS if it
          starts with inventory and baseline checksums. FAIL if it jumps
          to writing migration code.

  - description: "T2: After inventory, agent defines migration plan with rollback criteria"
    vars:
      query: >
        Migrating users table. Inventory complete: 50,000 rows, columns
        id/name/email/created_at, baseline checksums established
        (COUNT=50000, SUM(id)=1250025000). Foreign key: orders.user_id.
        What's the next phase?
    assert:
      - type: icontains-any
        value:
          - "plan"
          - "rollback"
          - "checkpoint"
      - type: llm-rubric
        value: >
          The agent should enter the Plan phase: defining migration steps
          in dependency order, with per-step rollback criteria and
          verification checkpoints. PASS if the plan includes rollback
          criteria. FAIL if it produces steps without rollback.

  - description: "T3: After planning, agent insists on dry-run before production"
    vars:
      query: >
        Migration plan approved: 4 steps (add columns, populate, verify,
        drop old column) with rollback criteria per step. I want to run
        it now against production.
    assert:
      - type: icontains-any
        value:
          - "dry-run"
          - "dry run"
          - "staging"
          - "copy"
          - "rehearsal"
      - type: llm-rubric
        value: >
          The agent MUST insist on a dry-run before production execution.
          Skipping dry-run is an explicit anti-pattern in the migrate
          workflow. PASS if the agent proposes running against a copy
          first. FAIL if it proceeds directly to production.

  - description: "T4: After successful dry-run, agent proceeds to execute with checkpoints"
    vars:
      query: >
        Dry-run complete against staging copy. All checksums match,
        50,000 rows migrated, execution time 45 seconds. No discrepancies.
        Ready to execute against production.
    assert:
      - type: icontains-any
        value:
          - "backup"
          - "checkpoint"
          - "step by step"
          - "execute"
      - type: llm-rubric
        value: >
          The agent should enter the Execute phase: verifying backup exists,
          executing step by step with checkpoints at each boundary.
          PASS if it mentions backup verification and per-step checkpoints.
          FAIL if it runs as a single unmonitored operation.

  - description: "T5: After execution, agent performs full reconciliation"
    vars:
      query: >
        Migration executed against production. All 4 steps passed
        checkpoints. What verification should I do now?
    assert:
      - type: icontains-any
        value:
          - "checksum"
          - "reconciliation"
          - "integrity"
          - "smoke test"
          - "verify"
      - type: llm-rubric
        value: >
          The agent should enter the Verify phase: full checksum
          reconciliation, referential integrity validation, application
          smoke tests, and performance comparison. PASS if it performs
          multi-dimensional verification beyond row counts. FAIL if it
          only checks row counts or declares success without verification.
