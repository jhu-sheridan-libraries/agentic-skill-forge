# Eval: Prompt efficiency — latency per routing call
#
# Tracks response latency as a proxy for context bloat. If a steering
# file edit improves scores but makes the prompt so large that latency
# doubles, that's a regression. The 30s threshold is generous — the
# goal is catching runaway growth, not micro-optimization.
#
# Note: type:cost is not supported by the Bedrock provider (no cost
# metadata returned). Latency is a reliable proxy — larger prompts
# take longer to process.
#
# Run:  bun run dev eval codeshop

description: "Prompt efficiency — latency per routing call stays bounded"

prompts:
  - - role: system
      content: file://dist/kiro/codeshop/POWER.md
    - role: user
      content: "{{user_query}}"

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-6
    config:
      region: us-east-1
      temperature: 0

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-6

tests:
  - description: "Routing call latency stays under 30s"
    vars:
      user_query: "Let's do TDD on the payment module"
    assert:
      - type: latency
        threshold: 30000
      - type: icontains-any
        value: ["drive-tests", "TDD", "red-green", "test-driven"]

  - description: "Complex routing call latency stays under 30s"
    vars:
      user_query: "This module feels too coupled, can you review the architecture?"
    assert:
      - type: latency
        threshold: 30000
      - type: icontains-any
        value: ["refactor-architecture", "architecture review", "shallow module"]

  - description: "Integration routing latency stays under 30s"
    vars:
      user_query: "Wire up the Stripe webhook endpoint"
    assert:
      - type: latency
        threshold: 30000
      - type: icontains-any
        value: ["integrate", "wire", "adapter"]

  - description: "Migration workflow entry latency stays under 30s"
    vars:
      user_query: "Migrate the user table to the new schema"
    assert:
      - type: latency
        threshold: 30000
      - type: icontains-any
        value: ["migrate", "migration", "checksum", "inventory"]
