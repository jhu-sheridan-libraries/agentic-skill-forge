# Eval: kanon onboarding guidance is accurate and audience-appropriate
#
# Verifies the POWER.md onboarding answers core setup, concept, and collection
# questions correctly for non-technical library staff.
#
# Run:  bun run dev eval kanon

description: "kanon onboarding gives accurate setup and concept guidance"

prompts:
  - file://dist/kiro/skill-forge/POWER.md

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-6
    config:
      region: us-east-1
      temperature: 0

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-6

tests:
  - description: "Setup guidance covers Bun, clone, and install"
    vars:
      user_query: "I'm new here. How do I install and set up Kanon?"
    assert:
      - type: llm-rubric
        value: >
          PASS if the response covers all three setup steps: installing
          Bun (curl from bun.sh), cloning the agentic-skill-forge repo,
          and running `bun install` in the kanon directory. FAIL
          if it omits Bun installation or the install step.

  - description: "skill vs power distinction is correct"
    vars:
      user_query: "What's the difference between a skill and a power?"
    assert:
      - type: llm-rubric
        value: >
          PASS if it explains a skill is general/cross-harness knowledge
          injected into AI context, while a power is a Kiro-specific
          bundle that can include steering files and MCP configuration.
          FAIL if it conflates them or claims powers are cross-harness.

  - description: "Library collection is jh-drcc, not a non-existent jhu"
    vars:
      user_query: "What collection should I tag library artifacts with?"
    assert:
      - type: llm-rubric
        value: >
          The real library collection is `jh-drcc`. PASS if the response
          tells the user to add `jh-drcc` to the collections field. FAIL
          if it invents a `jhu` collection or any other name.

  - description: "Reassures that no coding experience is required"
    vars:
      user_query: "I'm not a programmer. Can I still create an artifact?"
    assert:
      - type: llm-rubric
        value: >
          PASS if the response reassures that no coding is required —
          artifacts are Markdown and the wizard walks through metadata.
          FAIL if it says programming knowledge is required.

  - description: "Lists the supported harnesses"
    vars:
      user_query: "Which AI assistants can Kanon compile for?"
    assert:
      - type: llm-rubric
        value: >
          PASS if the response names the supported harnesses including
          Kiro, Claude Code, GitHub Copilot, Cursor, Windsurf, Cline, and
          Amazon Q Developer. FAIL if it lists fewer than five or invents
          unsupported harnesses.
