# Eval: integrate workflow — multi-turn phase progression
#
# Simulates an agent progressing through the 5-phase integrate workflow.
# The POWER.md is the system prompt; each test provides a conversation
# history as the user query to simulate phase transitions.
#
# Run:  bun run dev eval codeshop

description: "integrate workflow — multi-turn phase progression and methodology"

prompts:
  - - role: system
      content: file://dist/kiro/codeshop/POWER.md
    - role: user
      content: "{{query}}"

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-6
    config:
      region: us-east-1
      temperature: 0

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-6

tests:
  - description: "T1: User request triggers integrate skill and loads discover phase"
    vars:
      query: >
        I need to wire up the Stripe webhook endpoint to our payment service.
        Based on the codeshop skills, which workflow should I use and what's
        the first phase?
    assert:
      - type: icontains
        value: "integrate"
      - type: icontains-any
        value: ["discover", "target", "protocol", "data flow", "failure mode"]
      - type: llm-rubric
        value: >
          The agent should identify this as an integration task (integrate
          workflow) and begin the Discover phase: identifying the target
          system (Stripe), protocol, data flows, callers, and failure modes.
          PASS if it names integrate and starts discovery. FAIL if it
          skips to implementation or loads a different skill.

  - description: "T2: After discovery, agent transitions to contract phase"
    vars:
      query: >
        Using the integrate workflow for Stripe webhooks. Discovery complete:
        target is Stripe webhooks (REST/HTTPS), data flows are POST requests
        with event payloads (invoice.paid, payment_intent.succeeded), our
        PaymentService consumes parsed events, failure modes include signature
        verification failures and duplicate delivery. No existing adapter.
        What's the next phase in the integrate workflow?
    assert:
      - type: icontains-any
        value:
          - "contract"
          - "interface"
          - "types"
      - type: llm-rubric
        value: >
          The agent should transition to the Contract phase: defining
          request/response shapes, error codes, authentication (webhook
          signature verification), and the adapter's public interface
          BEFORE writing implementation. PASS if it defines the contract
          first. FAIL if it starts writing code.

  - description: "T3: After contract, agent transitions to wire phase with anti-corruption layer"
    vars:
      query: >
        Using the integrate workflow for Stripe webhooks. Discovery and
        contract phases are done. Contract defined:
        - StripeWebhookEvent { id, type, data, created }
        - WebhookHandlerResult { processed: boolean, eventId: string }
        - WebhookError: SignatureInvalid | PayloadMalformed | EventUnknown
        - Auth: Stripe-Signature header verified with webhook secret

        What's the next phase and what's the approach?
    assert:
      - type: icontains-any
        value:
          - "adapter"
          - "anti-corruption"
          - "test"
          - "wire"
      - type: llm-rubric
        value: >
          The agent should enter the Wire phase: proposing an
          anti-corruption layer adapter with integration tests using
          test doubles. PASS if it describes creating an adapter with
          tests (test double/mock/fake for Stripe). FAIL if it proposes
          calling Stripe directly without an adapter or skips tests.

  - description: "T4: After wiring, agent transitions to harden phase"
    vars:
      query: >
        Using the integrate workflow for Stripe webhooks. Wire phase done:
        StripeWebhookAdapter implements WebhookHandler interface, integration
        tests pass against a FakeStripeClient test double for happy path
        (valid signature → parsed event → handler called). What's the next
        phase in the integrate workflow?
    assert:
      - type: icontains-any
        value:
          - "harden"
          - "retry"
          - "timeout"
          - "circuit"
          - "error handling"
          - "resilience"
      - type: llm-rubric
        value: >
          The agent should enter the Harden phase: adding retries with
          backoff, circuit breaker, timeouts, and graceful degradation
          at the system boundary. PASS if it addresses error handling
          and resilience. FAIL if it considers the work done.

  - description: "T5: After hardening, agent transitions to verify phase"
    vars:
      query: >
        Using the integrate workflow for Stripe webhooks. Harden phase done:
        retry with exponential backoff (3 attempts), 5s timeout, circuit
        breaker (5 failures → open for 30s), graceful degradation returns
        202 Accepted when circuit is open. All resilience tests pass.
        What's the final phase in the integrate workflow?
    assert:
      - type: icontains-any
        value:
          - "verify"
          - "smoke test"
          - "staging"
          - "real"
          - "end-to-end"
      - type: llm-rubric
        value: >
          The agent should enter the Verify phase: running an end-to-end
          smoke test against the real Stripe service or a staging environment.
          PASS if it proposes verification against a real/staging endpoint.
          FAIL if it considers the work done without real-service testing.
