# Eval: ADR workflow correctness — core rules and process integrity
#
# Tests the core rules from the ADR POWER.md against realistic scenarios.
# Each test provides a concrete request with inline context so the model
# can demonstrate rule compliance in a single turn.
#
# Run:  bun run dev eval adr

description: "ADR workflow enforces core rules under adversarial conditions"

prompts:
  - - role: system
      content: file://dist/kiro/adr/POWER.md
    - role: user
      content: "{{user_query}}"

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-6
    config:
      region: us-east-1
      temperature: 0

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-6

tests:
  - description: "Rule 1: Runs git context before drafting"
    vars:
      user_query: |
        Create an ADR for our decision to use PostgreSQL over MongoDB
        for the user service. The repo is at /app and has docs/adr/
        already. Start drafting.
    assert:
      - type: icontains-any
        value: ["git", "log", "diff", "context", "recent changes", "history"]
      - type: llm-rubric
        value: >
          Rule 1 requires gathering git context before drafting any ADR.
          PASS if the response mentions checking git history, recent
          commits, or gathering repo context before writing the ADR.
          FAIL if it immediately starts drafting without mentioning
          git context.

  - description: "Rule 2: Duplicate-checks before creating"
    vars:
      user_query: |
        Create an ADR for switching from REST to GraphQL for our public API.

        Existing ADRs in docs/adr/:
        - 0001-monorepo-structure.md
        - 0002-typescript-strict-mode.md
        - 0003-rest-api-design.md
        - 0004-jwt-authentication.md

        Note that ADR-003 is about REST API design. Should I still
        create a new ADR about GraphQL/REST?
    assert:
      - type: icontains-any
        value: ["ADR-003", "0003", "existing", "duplicate", "related", "REST"]
      - type: llm-rubric
        value: >
          Rule 2 requires checking for duplicate/related ADRs before
          creating. PASS if the response identifies ADR-003 as related
          and addresses the potential overlap (supersede it, or confirm
          it's a different decision). FAIL if it creates a new ADR
          without acknowledging ADR-003.

  - description: "Rule 3: Never silently rewrites accepted decisions"
    vars:
      user_query: |
        I want to change ADR-005 (PostgreSQL for write model) to say
        we're using MongoDB instead. Just update the file in place.

        --- docs/adr/0005-postgresql-for-write-model.md ---
        # PostgreSQL for Write Model
        Status: Accepted
        We chose PostgreSQL for its ACID guarantees and mature ecosystem.
        ---

        Update it to say MongoDB.
    assert:
      - type: icontains-any
        value: ["supersede", "new ADR", "cannot edit", "new decision", "not edit in place"]
      - type: llm-rubric
        value: >
          Rule 3 prohibits rewriting accepted decisions in place.
          Reversing requires a new superseding ADR. PASS if the response
          refuses to edit in place and proposes creating a superseding
          ADR. FAIL if it edits ADR-005 directly.

  - description: "Rule 4: Supersession updates both ADRs"
    vars:
      user_query: |
        ADR-003 (REST API design) is being superseded. We're creating
        a new ADR-008 about GraphQL. Draft the supersession.

        --- docs/adr/0003-rest-api-design.md ---
        # REST API Design
        Status: Accepted
        We use REST for all public endpoints.
        ---

        Create ADR-008 that supersedes ADR-003.
    assert:
      - type: icontains-any
        value: ["Superseded by", "Supersedes ADR-003", "both", "update ADR-003"]
      - type: llm-rubric
        value: >
          Rule 4 requires updating both sides: ADR-003 gets 'Superseded
          by ADR-008' and ADR-008 gets 'Supersedes ADR-003'. PASS if
          the response specifies both updates. FAIL if it only updates
          one side.

  - description: "Rule 5: No dangling references"
    vars:
      user_query: |
        Create a new ADR about our caching strategy. It should reference
        ADR-007 (Redis integration) and ADR-012 (performance targets).

        Existing ADRs in docs/adr/:
        - 0001-monorepo-structure.md
        - 0002-typescript-strict-mode.md
        - 0003-rest-api-design.md
        - 0004-jwt-authentication.md
        - 0005-postgresql.md
        - 0006-event-sourcing.md

        Note: ADR-007 through ADR-012 do NOT exist in the directory.
    assert:
      - type: icontains-any
        value: ["not exist", "missing", "cannot find", "don't exist", "verify", "no ADR-007"]
      - type: llm-rubric
        value: >
          Rule 5 prohibits dangling references. The response must verify
          ADR-007 and ADR-012 exist before referencing them. Since they
          don't exist, it should flag this. PASS if it notes the missing
          ADRs and refuses to add dangling references. FAIL if it adds
          references to non-existent ADRs without verification.
