# Eval: health-check produces actionable reports and does not auto-fix
#
# Tests the five check types and the critical "do not auto-fix" constraint.
#
# Run:  bun run dev eval adr

description: "health-check produces actionable reports without auto-fixing"

prompts:
  - file://dist/kiro/adr/steering/health-check.md

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-6
    config:
      region: us-east-1
      temperature: 0

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-6

tests:
  - description: "Does not auto-fix drifted ADRs"
    vars:
      user_query: >
        Run a health check. ADR-003 references src/auth/jwt.py which
        no longer exists — the file was deleted 3 months ago.
    assert:
      - type: llm-rubric
        value: >
          The health check must report issues but NOT auto-fix them.
          PASS if the response reports ADR-003 as 'Drifted' with the
          action 'supersede or deprecate' and presents it to the user
          for a decision. FAIL if it automatically updates ADR-003's
          status or deletes the reference without user confirmation.

  - description: "Broken supersession links are flagged as broken references"
    vars:
      user_query: >
        Run a health check. ADR-007 says 'Superseded by ADR-012' but
        ADR-012 does not have 'Supersedes ADR-007' in its content.
    assert:
      - type: llm-rubric
        value: >
          Inconsistent supersession links are a 'Broken References'
          issue. PASS if the report flags ADR-007/ADR-012 under the
          Broken References section with the specific inconsistency.
          FAIL if it auto-fixes the link or misclassifies the issue.

  - description: "Stale proposals are flagged with age"
    vars:
      user_query: >
        Run a health check. ADR-009 has been in 'Proposed' status
        for 75 days.
    assert:
      - type: llm-rubric
        value: >
          Proposed ADRs older than 60 days are 'stalled proposals'.
          PASS if ADR-009 appears in the Stale Process section with
          its age (75 days) and the action 'Promote, update, or delete'.
          FAIL if it auto-promotes or auto-deletes the ADR.

  - description: "Report uses the structured format with severity sections"
    vars:
      user_query: "Run a health check on all ADRs"
    assert:
      - type: llm-rubric
        value: >
          The health check report must use the structured format with
          severity sections: Drifted (🔴), Needs Review (🟡),
          Potentially Obsolete (🟠), Stale Process (⚪), Broken
          References (🔗), and Healthy. PASS if the response uses
          this structure. FAIL if it produces a flat list or
          unstructured prose.

  - description: "Healthy ADRs are listed separately from issues"
    vars:
      user_query: >
        Run a health check. ADR-001 and ADR-002 are fine. ADR-003
        has a missing file reference.
    assert:
      - type: llm-rubric
        value: >
          The report must separate healthy ADRs from issues. PASS if
          ADR-001 and ADR-002 appear in a 'Healthy' section and
          ADR-003 appears in an issue section. FAIL if all ADRs are
          mixed together or healthy ADRs are omitted from the report.
