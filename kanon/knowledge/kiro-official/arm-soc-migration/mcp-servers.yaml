- name: arm-mcp-server
  transport: stdio
  command: docker
  args:
  - run
  - --rm
  - -i
  - --pull=always
  - armlimited/arm-mcp:latest
  env:
    FASTMCP_LOG_LEVEL: ERROR
    ARM_MCP_CACHE_DIR: ~/.cache/arm-mcp
    ARM_MCP_TIMEOUT: '30'
  autoApprove:
  - knowledge_base_search
  - sysreport_instructions
